services:
  postgres:
    image: postgres:16
    container_name: tecnicoapp-db
    environment:
      POSTGRES_DB: tecnicoapp
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in docker-compose.env}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5
    env_file:
      - docker-compose.env

volumes:
  pgdata:
