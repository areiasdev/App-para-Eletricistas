services:

  postgres:
    image: postgres:16
    container_name: tecnicoapp-db
    environment:
      POSTGRES_DB: tecnicoapp
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - internal

  api:
    build:
      context: .
      dockerfile: src/TecnicoApp.API/Dockerfile
    container_name: tecnicoapp-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;Port=5432;Database=tecnicoapp;
        Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD}
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET must be set (min 32 chars)}
      Jwt__Issuer: ${JWT_ISSUER:-https://tecnicoapp.pt}
      Jwt__Audience: ${JWT_AUDIENCE:-https://tecnicoapp.pt}
      Jwt__ExpiryMinutes: ${JWT_EXPIRY_MINUTES:-60}
      Cors__AllowedOrigins: ${FRONTEND_URL:?FRONTEND_URL must be set}
      App__BaseUrl: ${FRONTEND_URL}
      Smtp__Host: ${SMTP_HOST:-}
      Smtp__Port: ${SMTP_PORT:-587}
      Smtp__Username: ${SMTP_USERNAME:-}
      Smtp__Password: ${SMTP_PASSWORD:-}
      Smtp__FromName: ${SMTP_FROM_NAME:-TécnicoApp}
      Smtp__FromAddress: ${SMTP_FROM_ADDRESS:-}
      Stripe__SecretKey: ${STRIPE_SECRET_KEY:-}
      Stripe__WebhookSecret: ${STRIPE_WEBHOOK_SECRET:-}
      Stripe__PriceIdPro: ${STRIPE_PRICE_ID_PRO:-}
      Stripe__PriceIdTeam: ${STRIPE_PRICE_ID_TEAM:-}
    ports:
      - "8080:8080"
    restart: unless-stopped
    networks:
      - internal
      - public

  frontend:
    build:
      context: ./tecnico-app
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL must be set (public URL of the API)}
    container_name: tecnicoapp-frontend
    depends_on:
      - api
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - public

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  public:
    driver: bridge
